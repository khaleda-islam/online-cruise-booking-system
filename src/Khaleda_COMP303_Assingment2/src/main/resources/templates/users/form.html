<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('User Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 sidebar p-0">
      <div th:replace="~{fragments/layout :: sidebar('users')}"></div>
    </div>
    <main class="col-md-10 p-4">
      <div class="d-flex align-items-center mb-4">
        <a th:href="@{/users}" class="btn btn-outline-secondary me-3">
          <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="fw-semibold mb-0"
            th:text="${user.userId != null} ? 'Edit User' : 'New User'">User</h2>
      </div>

      <div class="card shadow-sm" style="max-width:720px;">
        <div class="card-body">
          <form th:action="@{/users/save}" th:object="${user}" method="post">
            <input type="hidden" th:field="*{userId}"/>
            <div class="row g-3">

              <div class="col-md-6">
                <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{firstName}" required/>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Last Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{lastName}" required/>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                <input type="email" class="form-control" th:field="*{email}" required/>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Phone</label>
                <input type="text" class="form-control" th:field="*{phone}"/>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
                <input type="password" class="form-control" th:field="*{passwordHash}"
                       th:required="${user.userId == null}"/>
                <div th:if="${user.userId != null}" class="form-text">Leave blank to keep current password.</div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Role</label>
                <select class="form-select" th:field="*{role}">
                  <option value="ROLE_USER">User</option>
                  <option value="ROLE_ADMIN">Admin</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">City</label>
                <input type="text" class="form-control" th:field="*{city}"/>
              </div>

              <div class="col-md-8">
                <label class="form-label fw-semibold">Address</label>
                <input type="text" class="form-control" th:field="*{address}"/>
              </div>

              <div class="col-md-4">
                <label class="form-label fw-semibold">Postal Code</label>
                <input type="text" class="form-control" th:field="*{postalCode}"/>
              </div>

              <div class="col-12 pt-2">
                <button type="submit" class="btn btn-primary me-2">
                  <i class="bi bi-check-lg me-1"></i>Save User
                </button>
                <a th:href="@{/users}" class="btn btn-outline-secondary">Cancel</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
