<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Users')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 sidebar p-0">
      <div th:replace="~{fragments/layout :: sidebar('users')}"></div>
    </div>
    <main class="col-md-10 p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-semibold mb-0"><i class="bi bi-people me-2 text-primary"></i>Users</h2>
        <a th:href="@{/users/new}" class="btn btn-primary">
          <i class="bi bi-plus-lg me-1"></i>New User
        </a>
      </div>

      <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>Full Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>City</th>
                  <th>Registered</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="u : ${users}">
                  <td th:text="${u.userId}"></td>
                  <td class="fw-semibold" th:text="${u.firstName + ' ' + u.lastName}"></td>
                  <td th:text="${u.email}"></td>
                  <td th:text="${u.phone != null ? u.phone : '-'}"></td>
                  <td th:text="${u.city != null ? u.city : '-'}"></td>
                  <td th:text="${u.createdAt != null ? #temporals.format(u.createdAt, 'yyyy-MM-dd') : '-'}"></td>
                  <td class="text-nowrap">
                    <a th:href="@{/users/{id}/edit(id=${u.userId})}"
                       class="btn btn-sm btn-outline-warning me-1" title="Edit">
                      <i class="bi bi-pencil"></i>
                    </a>
                    <a th:href="@{/users/{id}/delete(id=${u.userId})}"
                       class="btn btn-sm btn-outline-danger" title="Delete"
                       onclick="return confirm('Delete this user?')">
                      <i class="bi bi-trash"></i>
                    </a>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                  <td colspan="7" class="text-center text-muted py-4">
                    <i class="bi bi-inbox fs-3 d-block mb-2"></i>No users found.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
