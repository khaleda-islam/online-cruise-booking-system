<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Booking Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 sidebar p-0">
      <div th:replace="~{fragments/layout :: sidebar('bookings')}"></div>
    </div>
    <main class="col-md-10 p-4">
      <div class="d-flex align-items-center mb-4">
        <a th:href="@{/bookings}" class="btn btn-outline-secondary me-3">
          <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="fw-semibold mb-0"
            th:text="${booking.bookingId != null} ? 'Edit Booking' : 'New Booking'">Booking</h2>
      </div>

      <div class="card shadow-sm" style="max-width:780px;">
        <div class="card-body">
          <form th:action="@{/bookings/save}" th:object="${booking}" method="post">
            <input type="hidden" th:field="*{bookingId}"/>
            <div class="row g-3">

              <div class="col-md-6">
                <label class="form-label fw-semibold">User <span class="text-danger">*</span></label>
                <select class="form-select" name="user.userId" required>
                  <option value="">-- Select User --</option>
                  <option th:each="u : ${users}"
                          th:value="${u.userId}"
                          th:text="${u.firstName + ' ' + u.lastName + ' (' + u.email + ')'}"
                          th:selected="${booking.user != null and booking.user.userId == u.userId}">
                  </option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Cruise <span class="text-danger">*</span></label>
                <select class="form-select" name="cruise.cruiseId" id="cruiseSelect" required>
                  <option value="">-- Select Cruise --</option>
                  <option th:each="c : ${cruises}"
                          th:value="${c.cruiseId}"
                          th:text="${c.cruiseName + ' (' + c.departureDate + ')'}"
                          th:attr="data-base-price=${c.basePrice}"
                          th:selected="${booking.cruise != null and booking.cruise.cruiseId == c.cruiseId}">
                  </option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Cabin <span class="text-danger">*</span></label>
                <select class="form-select" name="cruiseCabin.cruiseCabinId" required>
                  <option value="">-- Select Cabin --</option>
                  <option th:each="cab : ${cabins}"
                          th:value="${cab.cruiseCabinId}"
                          th:text="${cab.cabinNumber + (cab.deck != null ? ' ' + cab.deck : '') + (cab.viewType != null ? ' - ' + cab.viewType : '')}"
                          th:selected="${booking.cruiseCabin != null and booking.cruiseCabin.cruiseCabinId == cab.cruiseCabinId}">
                  </option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Booking Date <span class="text-danger">*</span></label>
                <input type="date" class="form-control" th:field="*{bookingDate}" required/>
              </div>

              <div class="col-md-4">
                <label class="form-label fw-semibold">Total Price <span class="text-danger">*</span></label>
                <div class="input-group">
                  <span class="input-group-text">$</span>
                  <input type="number" step="0.01" min="0" class="form-control"
                         th:field="*{totalPrice}" readonly/>
                </div>
                <small class="text-muted">Calculated as: Base Price × Number of Passengers</small>
              </div>

              <div class="col-12">
                <label class="form-label fw-semibold">Special Requests</label>
                <textarea class="form-control" th:field="*{specialRequests}" rows="3"
                          placeholder="Any special requirements or requests..."></textarea>
              </div>

              <div class="col-12 pt-2">
                <button type="submit" class="btn btn-primary me-2">
                  <i class="bi bi-check-lg me-1"></i>Save Booking
                </button>
                <a th:href="@{/bookings}" class="btn btn-outline-secondary">Cancel</a>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Passengers Section (only shown when editing an existing booking) -->
      <div class="card shadow-sm mt-4" style="max-width:780px;" th:if="${booking.bookingId != null}">
        <div class="card-header bg-light d-flex justify-content-between align-items-center">
          <h5 class="mb-0">
            <i class="bi bi-people me-2"></i>Passengers
          </h5>
          <a th:href="@{/passengers/booking/{id}/new(id=${booking.bookingId})}" 
             class="btn btn-sm btn-success">
            <i class="bi bi-plus-circle me-1"></i>Add Passenger
          </a>
        </div>
        <div class="card-body">
          <div th:if="${booking.passengers != null and !booking.passengers.isEmpty()}">
            <div class="table-responsive">
              <table class="table table-hover">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Date of Birth</th>
                    <th>Gender</th>
                    <th>Nationality</th>
                    <th>Passport</th>
                    <th class="text-center">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="passenger : ${booking.passengers}">
                    <td th:text="${passenger.firstName + ' ' + passenger.lastName}">John Doe</td>
                    <td th:text="${passenger.dateOfBirth}">1990-01-01</td>
                    <td th:text="${passenger.gender ?: '-'}">Male</td>
                    <td th:text="${passenger.nationality ?: '-'}">American</td>
                    <td th:text="${passenger.passportNumber ?: '-'}">AB123456</td>
                    <td class="text-center">
                      <div class="btn-group btn-group-sm">
                        <a th:href="@{/passengers/{id}/edit(id=${passenger.passengerId})}" 
                           class="btn btn-outline-primary" title="Edit">
                          <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/passengers/{id}/delete(id=${passenger.passengerId})}" 
                           class="btn btn-outline-danger" title="Delete"
                           onclick="return confirm('Are you sure you want to remove this passenger?');">
                          <i class="bi bi-trash"></i>
                        </a>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="alert alert-info mb-0">
              <i class="bi bi-info-circle me-2"></i>
              <strong>Total Passengers:</strong> 
              <span th:text="${booking.passengers.size()}">0</span>
            </div>
          </div>
          <div th:if="${booking.passengers == null or booking.passengers.isEmpty()}" 
               class="text-center text-muted py-4">
            <i class="bi bi-person-x fs-1 d-block mb-2"></i>
            <p class="mb-0">No passengers added yet. Click "Add Passenger" to add travelers.</p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>

<script>
  // Update total price when cruise selection changes
  document.addEventListener('DOMContentLoaded', function() {
    const cruiseSelect = document.getElementById('cruiseSelect');
    const totalPriceInput = document.querySelector('input[name="totalPrice"]');
    
    if (cruiseSelect && totalPriceInput) {
      cruiseSelect.addEventListener('change', function() {
        const selectedOption = this.options[this.selectedIndex];
        const basePrice = selectedOption.getAttribute('data-base-price');
        
        if (basePrice) {
          totalPriceInput.value = parseFloat(basePrice).toFixed(2);
        } else {
          totalPriceInput.value = '';
        }
      });
    }
  });
</script>
</body>
</html>
