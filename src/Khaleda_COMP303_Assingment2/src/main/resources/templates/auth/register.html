<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register | Cruise Booking System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background: linear-gradient(135deg, #0f2744 0%, #1a3a5c 50%, #0d5c8f 100%); min-height: 100vh; }
    .auth-card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
    .brand-icon { font-size: 2.5rem; color: #0d6efd; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
  <div class="w-100" style="max-width: 520px; padding: 0 1rem;">

    <!-- Brand -->
    <div class="text-center mb-4">
      <i class="bi bi-ship brand-icon"></i>
      <h4 class="text-white mt-2 fw-bold">Cruise Booking System</h4>
      <p class="text-white-50 small">Create your account</p>
    </div>

    <div class="card auth-card">
      <div class="card-body p-4">
        <h5 class="card-title fw-bold mb-4 text-center">Create Account</h5>

        <!-- Error message -->
        <div th:if="${error}" class="alert alert-danger py-2 small" role="alert">
          <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post">
          <div class="row g-3">

            <div class="col-md-6">
              <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" th:field="*{firstName}" required autocomplete="given-name"/>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Last Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" th:field="*{lastName}" required autocomplete="family-name"/>
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">Email address <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" th:field="*{email}"
                       required autocomplete="email" placeholder="you@example.com"/>
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" th:field="*{passwordHash}"
                       required minlength="6" placeholder="Min. 6 characters"/>
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" class="form-control" name="confirmPassword"
                       required minlength="6" placeholder="Repeat password"/>
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Phone</label>
              <input type="text" class="form-control" th:field="*{phone}" autocomplete="tel"/>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">City</label>
              <input type="text" class="form-control" th:field="*{city}" autocomplete="address-level2"/>
            </div>

            <div class="col-12">
              <button type="submit" class="btn btn-primary w-100 fw-semibold">
                <i class="bi bi-person-plus me-1"></i>Create Account
              </button>
            </div>

          </div>
        </form>

        <hr class="my-3"/>
        <p class="text-center mb-0 small">
          Already have an account?
          <a th:href="@{/login}" class="fw-semibold">Sign in</a>
        </p>
      </div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
