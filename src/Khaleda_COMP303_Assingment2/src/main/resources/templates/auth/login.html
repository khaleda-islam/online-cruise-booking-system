<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login | Cruise Booking System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background: linear-gradient(135deg, #0f2744 0%, #1a3a5c 50%, #0d5c8f 100%); min-height: 100vh; }
    .auth-card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
    .brand-icon { font-size: 2.5rem; color: #0d6efd; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
  <div class="w-100" style="max-width: 420px; padding: 0 1rem;">

    <!-- Brand -->
    <div class="text-center mb-4">
      <i class="bi bi-ship brand-icon"></i>
      <h4 class="text-white mt-2 fw-bold">Cruise Booking System</h4>
      <p class="text-white-50 small">Online Cruise Booking &amp; Management</p>
    </div>

    <div class="card auth-card">
      <div class="card-body p-4">
        <h5 class="card-title fw-bold mb-4 text-center">Sign In</h5>

        <!-- Success message (after registration) -->
        <div th:if="${success}" class="alert alert-success py-2 small" role="alert">
          <i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span>
        </div>

        <!-- Error message -->
        <div th:if="${error}" class="alert alert-danger py-2 small" role="alert">
          <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
        </div>

        <!-- Logout message -->
        <div th:if="${message}" class="alert alert-info py-2 small" role="alert">
          <i class="bi bi-info-circle me-1"></i><span th:text="${message}"></span>
        </div>

        <form th:action="@{/login}" method="post">
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Email address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" id="username" name="username" class="form-control"
                     placeholder="you@example.com" required autofocus/>
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="password" name="password" class="form-control"
                     placeholder="Enter your password" required/>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
          </button>
        </form>

        <hr class="my-3"/>
        <p class="text-center mb-0 small">
          Don't have an account?
          <a th:href="@{/register}" class="fw-semibold">Create one</a>
        </p>
      </div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
