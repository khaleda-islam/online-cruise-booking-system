<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Passenger Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 sidebar p-0">
      <div th:replace="~{fragments/layout :: sidebar('bookings')}"></div>
    </div>
    <main class="col-md-10 p-4">
      <div class="d-flex align-items-center mb-4">
        <a th:href="@{/bookings/{id}/edit(id=${booking.bookingId})}" class="btn btn-outline-secondary me-3">
          <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="fw-semibold mb-0"
            th:text="${passenger.passengerId != null} ? 'Edit Passenger' : 'Add Passenger'">Passenger</h2>
      </div>

      <div class="card shadow-sm" style="max-width:800px;">
        <div class="card-header bg-light">
          <h5 class="mb-0">
            <i class="bi bi-person-badge me-2"></i>
            Passenger Details for Booking #<span th:text="${booking.bookingId}">1</span>
          </h5>
        </div>
        <div class="card-body">
          <form th:action="@{/passengers/save}" th:object="${passenger}" method="post">
            <input type="hidden" th:field="*{passengerId}"/>
            <input type="hidden" name="bookingId" th:value="${booking.bookingId}"/>
            
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{firstName}" required
                       placeholder="Enter first name"/>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Last Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{lastName}" required
                       placeholder="Enter last name"/>
              </div>

              <div class="col-md-4">
                <label class="form-label fw-semibold">Date of Birth <span class="text-danger">*</span></label>
                <input type="date" class="form-control" th:field="*{dateOfBirth}" required/>
              </div>

              <div class="col-md-4">
                <label class="form-label fw-semibold">Gender</label>
                <select class="form-select" th:field="*{gender}">
                  <option value="">-- Select --</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label fw-semibold">Nationality</label>
                <input type="text" class="form-control" th:field="*{nationality}"
                       placeholder="e.g., American"/>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Passport Number</label>
                <input type="text" class="form-control" th:field="*{passportNumber}"
                       placeholder="Enter passport number"/>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Passport Expiry</label>
                <input type="date" class="form-control" th:field="*{passportExpiry}"/>
              </div>

              <div class="col-md-12">
                <label class="form-label fw-semibold">Dietary Requirements</label>
                <textarea class="form-control" th:field="*{dietaryRequirements}" rows="2"
                          placeholder="Any dietary restrictions or preferences..."></textarea>
              </div>

              <div class="col-md-12">
                <label class="form-label fw-semibold">Medical Notes</label>
                <textarea class="form-control" th:field="*{medicalNotes}" rows="2"
                          placeholder="Any medical conditions or special needs..."></textarea>
              </div>

              <div class="col-12 pt-3 border-top">
                <button type="submit" class="btn btn-primary me-2">
                  <i class="bi bi-check-lg me-1"></i>
                  <span th:text="${passenger.passengerId != null} ? 'Update Passenger' : 'Add Passenger'">Save</span>
                </button>
                <a th:href="@{/bookings/{id}/edit(id=${booking.bookingId})}" class="btn btn-outline-secondary">
                  <i class="bi bi-x-lg me-1"></i>Cancel
                </a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
