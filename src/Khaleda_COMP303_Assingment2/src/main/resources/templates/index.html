<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 sidebar p-0">
      <div th:replace="~{fragments/layout :: sidebar('home')}"></div>
    </div>
    <main class="col-md-10 p-4">
      <h2 class="mb-4 fw-semibold"><i class="bi bi-speedometer2 me-2 text-primary"></i>Dashboard</h2>

      <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- Stats Row -->
      <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3">
          <div class="card stat-card blue shadow-sm">
            <div class="card-body d-flex justify-content-between align-items-center">
              <div>
                <p class="text-muted small mb-1">Total Cruises</p>
                <h3 class="fw-bold mb-0" th:text="${cruiseCount}">0</h3>
              </div>
              <i class="bi bi-compass fs-1 text-primary opacity-25"></i>
            </div>
            <div class="card-footer bg-transparent border-0 pt-0">
              <a th:href="@{/cruises}" class="small text-decoration-none">View all &rarr;</a>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="card stat-card green shadow-sm">
            <div class="card-body d-flex justify-content-between align-items-center">
              <div>
                <p class="text-muted small mb-1">Total Bookings</p>
                <h3 class="fw-bold mb-0" th:text="${bookingCount}">0</h3>
              </div>
              <i class="bi bi-calendar-check fs-1 text-success opacity-25"></i>
            </div>
            <div class="card-footer bg-transparent border-0 pt-0">
              <a th:href="@{/bookings}" class="small text-decoration-none">View all &rarr;</a>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="card stat-card orange shadow-sm">
            <div class="card-body d-flex justify-content-between align-items-center">
              <div>
                <p class="text-muted small mb-1">Registered Users</p>
                <h3 class="fw-bold mb-0" th:text="${userCount}">0</h3>
              </div>
              <i class="bi bi-people fs-1 text-warning opacity-25"></i>
            </div>
            <div class="card-footer bg-transparent border-0 pt-0">
              <a th:href="@{/users}" class="small text-decoration-none">View all &rarr;</a>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="card stat-card purple shadow-sm">
            <div class="card-body d-flex justify-content-between align-items-center">
              <div>
                <p class="text-muted small mb-1">Total Ships</p>
                <h3 class="fw-bold mb-0" th:text="${shipCount}">0</h3>
              </div>
              <i class="bi bi-ship fs-1 opacity-25" style="color:#6f42c1;"></i>
            </div>
            <div class="card-footer bg-transparent border-0 pt-0">
              <a th:href="@{/ships}" class="small text-decoration-none">View all &rarr;</a>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <!-- Available Cruises -->
        <div class="col-lg-6">
          <div class="card shadow-sm h-100">
            <div class="card-header d-flex justify-content-between align-items-center bg-white">
              <strong><i class="bi bi-compass me-2 text-primary"></i>Available Cruises</strong>
              <a th:href="@{/cruises/new}" class="btn btn-sm btn-primary">
                <i class="bi bi-plus-lg"></i> New
              </a>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                  <thead class="table-light">
                    <tr>
                      <th>Name</th><th>Departure</th><th>Price</th><th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr th:each="c : ${availableCruises}">
                      <td th:text="${c.cruiseName}"></td>
                      <td th:text="${c.departureDate}"></td>
                      <td th:text="'$' + ${c.basePrice}"></td>
                      <td><span class="badge bg-success" th:text="${c.status}">AVAILABLE</span></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(availableCruises)}">
                      <td colspan="4" class="text-center text-muted py-3">No available cruises</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
            <div class="card-footer bg-white text-end">
              <a th:href="@{/cruises}" class="btn btn-sm btn-outline-primary">View All Cruises</a>
            </div>
          </div>
        </div>

        <!-- Recent Bookings -->
        <div class="col-lg-6">
          <div class="card shadow-sm h-100">
            <div class="card-header d-flex justify-content-between align-items-center bg-white">
              <strong><i class="bi bi-calendar-check me-2 text-success"></i>Recent Bookings</strong>
              <a th:href="@{/bookings/new}" class="btn btn-sm btn-success">
                <i class="bi bi-plus-lg"></i> New
              </a>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                  <thead class="table-light">
                    <tr><th>#</th><th>User</th><th>Total</th><th>Status</th></tr>
                  </thead>
                  <tbody>
                    <tr th:each="b, iter : ${recentBookings}" th:if="${iter.index < 8}">
                      <td th:text="${b.bookingId}"></td>
                      <td th:text="${b.user != null ? b.user.firstName + ' ' + b.user.lastName : '-'}"></td>
                      <td th:text="'$' + ${b.totalPrice}"></td>
                      <td>
                        <span class="badge"
                              th:classappend="${b.bookingStatus == 'CONFIRMED'} ? 'bg-success' : (${b.bookingStatus == 'CANCELLED'} ? 'bg-danger' : 'bg-warning text-dark')"
                              th:text="${b.bookingStatus}"></span>
                      </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(recentBookings)}">
                      <td colspan="4" class="text-center text-muted py-3">No bookings yet</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
            <div class="card-footer bg-white text-end">
              <a th:href="@{/bookings}" class="btn btn-sm btn-outline-success">View All Bookings</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
